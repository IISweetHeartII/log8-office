name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Prepare runtime config files
        run: |
          cp state.sample.json state.json || true
          cp join-keys.sample.json join-keys.json || true

      - name: Start server in background
        run: python backend/app.py &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            if python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:19000/health', timeout=2)" 2>/dev/null; then
              echo "Server is up."
              break
            fi
            echo "Waiting... ($i/15)"
            sleep 1
          done

      - name: Run smoke test
        run: python3 scripts/smoke_test.py --base-url http://127.0.0.1:19000

  frontend-syntax:
    name: Frontend JS syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check inline JS syntax in index.html
        run: |
          python3 - <<'PY'
          import re, subprocess, sys, tempfile, os
          html = open('frontend/index.html', encoding='utf-8').read()
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', html, re.S | re.I)
          if not scripts:
              print('No inline <script> block found in frontend/index.html'); sys.exit(1)
          fail = False
          for i, s in enumerate(scripts):
              with tempfile.NamedTemporaryFile('w', suffix='.js', delete=False, encoding='utf-8') as f:
                  f.write(s.replace('{{VERSION_TIMESTAMP}}', '0')); path = f.name
              r = subprocess.run(['node', '--check', path], capture_output=True, text=True)
              os.unlink(path)
              if r.returncode != 0:
                  print(f'Inline script block {i} syntax error:\n{r.stderr}'); fail = True
          print('OK' if not fail else 'FAILED')
          sys.exit(1 if fail else 0)
          PY
